<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — CivicPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="assets/images/logo.png" alt="CivicPulse" style="height:40px;width:auto;border-radius:6px;">
      <span>CivicPulse</span>
    </div>
    <div class="login-tabs">
      <button class="login-tab active" id="tabLogin">Login</button>
      <button class="login-tab" id="tabRegister">Register</button>
    </div>

    <div id="loginForm">
      <div class="login-form">
        <div class="form-group">
          <label>Phone / Email</label>
          <input type="text" placeholder="+91 XXXXX or email" class="form-input"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" class="form-input"/>
        </div>
        <button class="btn-primary btn-login" onclick="window.location='index.html'">Login →</button>
        <div class="divider">or</div>
        <button class="btn-outline btn-login" style="text-align:center">🔢 Login with OTP</button>
      </div>
    </div>

    <div id="registerForm" class="hidden">
      <div class="login-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Your name" class="form-input"/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="+91 XXXXX XXXXX" class="form-input"/>
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" placeholder="e.g. Jamshedpur" class="form-input"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" class="form-input"/>
        </div>
        <button class="btn-primary btn-login" onclick="window.location='index.html'">Create Account →</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
